<div
    class="absolute left-0 top-33.5 bg-white w-screen opacity-0 invisible md:group-hover/couch:opacity-100 md:group-hover/couch:visible transition-all duration-200 delay-150 pb-13 max-md:fixed max-md:top-0 max-md:-left-full max-md:[&.active]:left-0 max-md:opacity-100 max-md:h-screen max-md:[&.active]:visible max-md:[&.active]:opacity-100 max-md:p-0"
>
    <div class="container flex md:gap-32 max-md:flex-col max-md:p-0">
        <h3 class="text-2xl font-semibold max-md:flex max-md:items-center max-md:justify-between max-md:h-18.5 max-md:px-4">
            <div>
                <svg class="size-6 md:hidden close-submenu">
                    <use
                        xlink:href="/sprites.svg#arrow-left"
                    />
                </svg>
            </div>
            {{title}}
            <div>
                <svg class="size-6 close md:hidden">
                    <use
                        xlink:href="/sprites.svg#close"
                    />
                </svg>
            </div>
        </h3>
        <ul class="flex flex-col md:gap-7 [&>li>a]:text-sm">
            {{#each items}}
            <li class="max-md:h-18.5  max-md:border-b  max-md:border-brown-light">
                <a class="max-md:h-full max-md:w-full max-md:px-4 max-md:flex max-md:items-center" href="##">{{this}}</a>
            </li>
            {{/each}}
        </ul>
    </div>
</div>
