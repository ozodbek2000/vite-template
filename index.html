<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MANN HOME</title>
    </head>
    <body>
        <div class="root max-md:mb-70.75">
            
            <div class="bg-brown text-white relative z-3 max-sm:text-sm">
                <div class="container flex-between-center h-12.5">
                    <div class="flex items-center gap-2 cursor-pointer popup-open">
                        <svg class="size-6 ">
                            <use xlink:href="/sprites.svg#globe"/>
                        </svg>
                        <span>RU</span>
                    </div>
                    <div class=""><a href="##">Магазины</a></div>
                </div>
            </div>

            <div class="max-w-119.5 bg-white px-8 py-6 fixed md:top-0 [&.active]:left-0 z-99 h-screen opacity-0 invisible [&.active]:visible [&.active]:opacity-100 transition-300 -left-full max-md:h-75 max-md:bottom-0 max-md:p-4 max-md:w-full">

                <div class="">
                    <svg class="size-6 close ml-auto close-popup cursor-pointer">
                        <use
                            xlink:href="/sprites.svg#close"
                        />
                    </svg>
                </div>
                <h3 class="text-[24px] font-bold mt-6 max-md:text-[20px]">
                    Выберите предпочтительный язык
                </h3>
                <div class="flex items-center gap-3 text-sm mt-6 mb-18 max-md:mb-12">
                    <div class="h-10 p-3 bg-grey-1 rounded-[100px] flex items-center justify-center cursor-pointer">
                        Русский
                    </div>
                    <div class="h-10 p-3 rounded-[100px] flex items-center justify-center border border-black font-bold cursor-pointer">
                        O'zbek
                    </div>
                </div>

                <a class="main-btn close-popup" href="##">Закрыть</a>

            </div>

            {{>header}}

            <main>
                {{>main}}
                {{>sofa}}
                {{>brands}}
                {{>discount}}
                {{>big}}
            </main>

            {{>footer}}
            {{>overlays}}
        </div>
        <script type="module" src="/scripts/app.js"></script>
    </body>
</html>
